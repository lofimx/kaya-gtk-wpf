name: macOS Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-arm64:
    name: Build (arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install gjs gtk4 libadwaita libsoup gobject-introspection \
            adwaita-icon-theme gdk-pixbuf meson ninja node \
            dylibbundler librsvg

      - name: Build .app bundle
        run: bash build-aux/macos/bundle.sh

      - name: Verify bundle
        run: |
          test -x SaveButton.app/Contents/MacOS/kaya
          test -f SaveButton.app/Contents/Resources/bin/gjs
          test -f SaveButton.app/Contents/Resources/share/kaya/org.savebutton.SaveButton.src.gresource
          test -f SaveButton.app/Contents/Resources/share/kaya/org.savebutton.SaveButton.data.gresource
          test -f SaveButton.app/Contents/Resources/share/kaya/kaya-launcher.js
          test -f SaveButton.app/Contents/Resources/savebutton.icns
          file SaveButton.app/Contents/Resources/bin/gjs | grep -q "arm64"
          echo "arm64 bundle verified."

      - name: Upload arm64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: SaveButton-arm64
          path: SaveButton.app
          retention-days: 1

  build-x86_64:
    name: Build (x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew install gjs gtk4 libadwaita libsoup gobject-introspection \
            adwaita-icon-theme gdk-pixbuf meson ninja node \
            dylibbundler librsvg

      - name: Build .app bundle
        run: bash build-aux/macos/bundle.sh

      - name: Verify bundle
        run: |
          test -x SaveButton.app/Contents/MacOS/kaya
          test -f SaveButton.app/Contents/Resources/bin/gjs
          file SaveButton.app/Contents/Resources/bin/gjs | grep -q "x86_64"
          echo "x86_64 bundle verified."

      - name: Upload x86_64 bundle
        uses: actions/upload-artifact@v4
        with:
          name: SaveButton-x86_64
          path: SaveButton.app
          retention-days: 1

  universal-dmg:
    name: Universal Binary DMG
    needs: [build-arm64, build-x86_64]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: SaveButton-arm64
          path: SaveButton-arm64.app

      - name: Download x86_64 bundle
        uses: actions/download-artifact@v4
        with:
          name: SaveButton-x86_64
          path: SaveButton-x86_64.app

      - name: Create Universal Binary
        run: bash build-aux/macos/make-universal.sh SaveButton-arm64.app SaveButton-x86_64.app SaveButton.app

      - name: Verify Universal Binary
        run: |
          file SaveButton.app/Contents/Resources/bin/gjs
          file SaveButton.app/Contents/Resources/bin/gjs | grep -q "universal"
          echo "Universal binary verified."

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Code sign and create DMG
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARIZE_APPLE_ID: ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          MACOS_NOTARIZE_PASSWORD: ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          MACOS_NOTARIZE_TEAM_ID: ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: bash build-aux/macos/create-dmg.sh SaveButton.app

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: SaveButton-macOS-Universal
          path: "*.dmg"

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
